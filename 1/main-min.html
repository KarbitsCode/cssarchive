<script type="text/javascript">
setTimeout(function() {
  history.pushState("", document.title, window.location.pathname + "");
}, 500);
function autoRefresh(t) {
  let redirect_url = "../redir.html?go=1%2Fmain-min.html";
  let delay = 1;
  let input_time = document.getElementById("url_time");
  let time = input_time.value = delay; 
  function redirect_page() {
    if (time !== 1) {
      time -= 1;
      input_time.value = time;
      setTimeout(redirect_page, 1000);
    } else {
      window.location.href = redirect_url;
    };
  };
  setTimeout(redirect_page, t);
};
function gotoPage(l) {
  if (window.document.documentMode) {
    window.location.replace(l);
  } else {
    window.location.replace("../redir.html?go=" + l);
  };
};
function keyEvent(k) {
  document.addEventListener('keydown', function(event) {
    if (event.ctrlKey && (event.which == k || event.keyCode == k)) {
	  console.log("Keys Detected");
	  window.location.replace("#keys");
      window.open("https://sites.google.com/view/passform/24515?read_current=1");
	  window.location.replace("#navigasi");
    };
  });
};
window.onload = function() {
  autoRefresh(300000);
  keyEvent(89);
  setTimeout(function() {
    window.location.replace("#navigasi");
  }, 2000);
};
</script>
